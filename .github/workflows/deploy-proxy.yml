name: Deploy Ofertaupsellcocina Proxy to Cloudflare Workers

on:
  push:
    branches:
      - main
    paths:
      - "cloudflare-proxy/**"
      - ".github/workflows/deploy-proxy.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Deploy proxy worker (with route) to Cloudflare
        working-directory: cloudflare-proxy
        run: npx wrangler@4.107.0 deploy --config wrangler.json
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
